<svg width="700" height="120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .text {
      font-family: 'Fira Code', monospace;
      font-size: 20px;
      font-weight: 600;
      fill: #2F80ED;
      opacity: 0;
    }
    .sub {
      font-family: 'Fira Code', monospace;
      font-size: 15px;
      fill: #8b949e;
      opacity: 0;
    }
    .cursor {
      fill: #2F80ED;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Durée totale du cycle : 24s — chaque ligne dure 4s */
    .t1 { animation: t1 24s linear infinite; }
    .t2 { animation: t2 24s linear infinite; }
    .t3 { animation: t3 24s linear infinite; }
    .t4 { animation: t4 24s linear infinite; }
    .t5 { animation: t5 24s linear infinite; }
    .t6 { animation: t6 24s linear infinite; }

    @keyframes t1 {
      0%      { opacity: 0; }
      2%      { opacity: 1; }
      14%     { opacity: 1; }
      16.6%   { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes t2 {
      0%      { opacity: 0; }
      16.6%   { opacity: 0; }
      18.6%   { opacity: 1; }
      30.6%   { opacity: 1; }
      33.2%   { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes t3 {
      0%      { opacity: 0; }
      33.2%   { opacity: 0; }
      35.2%   { opacity: 1; }
      47.2%   { opacity: 1; }
      49.8%   { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes t4 {
      0%      { opacity: 0; }
      49.8%   { opacity: 0; }
      51.8%   { opacity: 1; }
      63.8%   { opacity: 1; }
      66.4%   { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes t5 {
      0%      { opacity: 0; }
      66.4%   { opacity: 0; }
      68.4%   { opacity: 1; }
      80.4%   { opacity: 1; }
      83%     { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes t6 {
      0%      { opacity: 0; }
      83%     { opacity: 0; }
      85%     { opacity: 1; }
      97%     { opacity: 1; }
      99%     { opacity: 0; }
      100%    { opacity: 0; }
    }
  </style>

  <rect width="700" height="120" rx="10" class="bg"/>

  <text x="350" y="55" text-anchor="middle" class="text t1">Bonjour, je suis Stéphane 👋</text>
  <text x="350" y="55" text-anchor="middle" class="text t2">16 ans industrie → Dev IA en construction 🚀</text>
  <text x="350" y="55" text-anchor="middle" class="text t3">Formation CD2IA · Metz Numeric School · Niveau 6</text>
  <text x="350" y="55" text-anchor="middle" class="sub  t4">Le code, c'est mon nouveau chantier.</text>
  <text x="350" y="55" text-anchor="middle" class="sub  t5">Chaque ligne écrite est une reconversion réussie.</text>
  <text x="350" y="55" text-anchor="middle" class="sub  t6">Tard vaut mieux que jamais — surtout en dev.</text>

  <rect x="345" y="98" width="10" height="3" class="cursor"/>
</svg>
