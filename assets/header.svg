<svg width="700" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="120" rx="10" fill="#0d1117"/>

  <!-- Ligne 1 -->
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#2F80ED">
    Bonjour, je suis Stephane
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.14;0.17;1" dur="24s" repeatCount="indefinite"/>
  </text>

  <!-- Ligne 2 -->
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#2F80ED">
    16 ans industrie - Dev IA en construction
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.17;0.19;0.31;0.34;1" dur="24s" repeatCount="indefinite"/>
  </text>

  <!-- Ligne 3 -->
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="16" fill="#2F80ED">
    Formation CD2IA - Metz Numeric School - Niveau 6
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.34;0.36;0.48;0.51;1" dur="24s" repeatCount="indefinite"/>
  </text>

  <!-- Ligne 4 -->
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="16" fill="#8b949e">
    Le code, c'est mon nouveau chantier.
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.51;0.53;0.65;0.68;1" dur="24s" repeatCount="indefinite"/>
  </text>

  <!-- Ligne 5 -->
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="15" fill="#8b949e">
    Chaque ligne ecrite est une reconversion reussie.
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.68;0.70;0.82;0.85;1" dur="24s" repeatCount="indefinite"/>
  </text>

  <!-- Ligne 6 -->
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="15" fill="#8b949e">
    Tard vaut mieux que jamais - surtout en dev.
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.85;0.87;0.97;1;1" dur="24s" repeatCount="indefinite"/>
  </text>

  <!-- Curseur clignotant -->
  <rect x="345" y="98" width="10" height="3" fill="#2F80ED">
    <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
